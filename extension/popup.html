<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 290px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
      background-color: #f9f9f9;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 15px;
      color: #5865F2;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 9px;
      font-weight: 700;
      background: #5865F2;
      color: #fff;
      padding: 2px 5px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eaeaea;
    }
    .setting-row:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .label {
      font-size: 13px;
      font-weight: 600;
    }
    .sub-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 21px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 15px;
      width: 15px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider        { background-color: #5865F2; }
    input:focus  + .slider        { box-shadow: 0 0 1px #5865F2; }
    input:checked + .slider:before { transform: translateX(17px); }

    /* Status bar */
    .status {
      margin-top: 14px;
      font-size: 11px;
      text-align: center;
      padding: 7px 10px;
      border-radius: 6px;
      font-weight: 500;
    }
    .status.checking    { background: #e8e8e8; color: #555; }
    .status.connected   { background: #d4edda; color: #155724; }
    .status.disconnected{ background: #f8d7da; color: #721c24; }

    /* Divider */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>
    YT-Presence
    <span class="badge">v2.0</span>
  </h2>

  <div class="section-title">General</div>

  <div class="setting-row">
    <div>
      <div class="label">Enable Presence</div>
      <div class="sub-label">YouTube / YouTube Music → Discord</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="setting-row">
    <div>
      <div class="label">Filter Titles</div>
      <div class="sub-label">Remove [Official], 【公式】 etc.</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="filterToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div id="connectionStatus" class="status checking">
    Daemon: Checking...
  </div>

  <script src="popup.js"></script>
</body>
</html>
